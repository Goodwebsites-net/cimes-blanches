# ══════════════════════════════════════════
# Élevage des Cimes Blanches — netlify.toml
# ══════════════════════════════════════════

[build]
  publish = "."

# Activer Netlify Identity pour Decap CMS
[[plugins]]
  package = "@netlify/plugin-emails"

# ── Headers sécurité ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Headers cache images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers cache CSS/JS
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Protéger l'admin
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# ── Redirects ──
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# 404 custom
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
