# ───────────────────────────────────────────────────────────────
# Configuration Netlify — Template master GoodWebsites.ch
# Indique a Netlify de COMPILER le site avec Eleventy a chaque push.
# Sans ce fichier, Netlify sert les fichiers bruts et le CMS ne
# pilote rien. C'est le fichier le plus important du deploiement.
# ───────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

# Securite : empeche l'indexation de l'admin par les moteurs
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"
